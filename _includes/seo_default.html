<title>{{ site.title }} - {{ page.title }}</title>

<meta name="charset" content="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="title" content="{{ site.title }} - {{ page.title }}">
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="author" content="{{ page.author | default: site.author.name }}">
<meta name="keywords" content="FireWave Interactive, Gabriel Aplok, Gabriel, Aplok, Project Walker, Project, Walker, Kolpa Engine, Kolpa, Engine, Programmer, Developer, Indie, Independent, Brazilian">
<meta name='dmca-site-verification' content='TlFhcXFzaUd3RjdyUnZjVzNnWXJyQ09rcG9MUUFQSEpHZG5sUjdDYjhHTT01' />

<link rel="canonical" href="{{ page.url | absolute_url }}">

<meta property="twitter:card" content="summary">
<meta property="twitter:title" content="{{ site.title }} - {{ page.title }}">
<meta property="twitter:description" content="{{ page.description | default: site.description }}">
<meta property="og:type" content="website">
<meta property="og:locale" content="{{ site.lang | default: 'en-US' }}">
<meta property="og:site_name" content="{{ site.title }} - {{ page.title }}">
<meta property="og:title" content="{{ site.title }} - {{ page.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">

<link rel="shortcut icon" href="{{ site.icon | absolute_url }}">
<link rel="apple-touch-icon" href="{{ site.icon | absolute_url }}">
<link rel="icon" href="{{ site.icon | absolute_url }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link rel="stylesheet" href="{{ '/assets/css/styles.css?v=' | append: site.github.build_revision | absolute_url }}">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }} - {{ page.title }}" href="{{ 'atom.xml' | absolute_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }} - {{ page.title }}" href="{{ 'atom.xml' | absolute_url }}">

<meta name="msapplication-TileColor" content="#151515">
<meta name="theme-color" content="#151515">

<link rel="preconnect" href="cdnjs.cloudflare.com" crossorigin>
<link rel="preconnect" href="fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="media.discordapp.net" crossorigin>

<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "WebSite",
		"description": "{{ page.description | default: site.description }}",
		"headline": "{{ site.title }} - {{ page.title }}",
		"name": "{{ site.title }}",
		"url": "{{ site.url | absolute_url }}",
		"@graph": [
			{
				"@type": "BreadcrumbList",
				"@context": "https://schema.org/",
				"itemListElement": [
					{
						"@type": "ListItem",
						"position": 1,
						"item": {
							"@id": "{{ site.url | absolute_url }}",
							"name": "{{ site.title }}"
						}
					},
					{
						"@type": "ListItem",
						"position": 2,
						"item": {
							"@id": "{{ site.url | absolute_url }} {{ '/projects.html' | absolute_url }}",
							"name": "Projects"
						}
					},
					{
						"@type": "ListItem",
						"position": 4,
						"item": {
							"@id": "{{ site.url | absolute_url }} {{ '/blog.html' | absolute_url }}",
							"name": "Blog"
						}
					},
					{
						"@type": "ListItem",
						"position": 5,
						"item": {
							"@id": "{{ site.url | absolute_url }} {{ page.url | absolute_url }}",
							"name": "{{ page.title }}"
						}
					}
				]
			}
		]
	}
</script>
