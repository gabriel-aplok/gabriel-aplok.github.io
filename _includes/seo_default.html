<title>{{ site.title }} - {{ page.title }}</title>

<meta name="charset" content="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="title" content="{{ site.title }} - {{ page.title }}">
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="author" content="{{ page.author | default: site.author.name }}">
<meta name="keywords" content="FireWave Interactive, Gabriel Aplok, Gabriel, Aplok, Project Walker, Project, Walker, Kolpa Engine, Kolpa, Engine, Programmer, Developer, Indie, Independent, Brazilian">
<meta name="robots" content="all">
<meta name="revisit-after" content="1 days">

<link rel="canonical" href="{{ '/' | absolute_url }}">

<meta property="twitter:card" content="summary">
<meta property="twitter:title" content="{{ site.title }} - {{ page.title }}">
<meta property="twitter:description" content="{{ page.description | default: site.description }}">
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.title }} - {{ page.title }}">
<meta property="og:title" content="{{ site.title }} - {{ page.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">

<link rel="shortcut icon" href="{{ site.icon | relative_url }}">
<link rel="apple-touch-icon" href="{{ site.icon | relative_url }}">
<link rel="icon" href="{{ site.icon | relative_url }}">
{% if page.use_new_theme %}
<link rel="stylesheet" href="{{ '/assets/css/minimal.css?v=' | append: site.github.build_revision | relative_url }}">
{% else %}
<link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
{% endif %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }} - {{ page.title }}" href="{{ 'atom.xml' | relative_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }} - {{ page.title }}" href="{{ 'atom.xml' | relative_url }}">
<link rel="search" type="application/opensearchdescription+xml" title="{{ site.title }} - {{ page.title }}" href="{{ 'opensearch.xml' | relative_url }}">

<meta name="msapplication-TileColor" content="#151515">
<meta name="theme-color" content="#151515">

<link rel="preconnect" href="cdnjs.cloudflare.com" crossorigin>
<link rel="preconnect" href="fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="media.discordapp.net" crossorigin>
