<title>{{ site.title }} - {{ page.title }}</title>

<meta name="charset" content="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="title" content="{{ site.title }} - {{ page.title }}">
<meta name="description" content="{{ site.description }}">
<meta name="author" content="{{ site.author.name }}">

<link rel="canonical" href="{{ '/' | relative_url }}">

<meta property="twitter:card" content="summary">
<meta property="twitter:title" content="{{ site.title }} - {{ page.title }}">
<meta property="twitter:description" content="{{ site.description }}">
<meta property="og:type" content="article">
<meta property="og:site_name" content="{{ site.title }} - {{ page.title }}">
<meta property="og:title" content="{{ site.title }} - {{ page.title }}">
<meta property="og:description" content="{{ site.description }}">

<link rel="shortcut icon" href="{{ site.icon | relative_url }}">
<link rel="apple-touch-icon" href="{{ site.icon | relative_url }}">
<link rel="icon" href="{{ site.icon | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }} - {{ page.title }}" href="{{ 'atom.xml' | relative_url }}">
<link rel="search" type="application/opensearchdescription+xml" title="{{ site.title }} - {{ page.title }}" href="{{ 'opensearch.xml' | relative_url }}">

<meta name="msapplication-TileColor" content="#151515">
<meta name="theme-color" content="#151515">
