<title>{{ page.title }} - {{ site.title }}</title>

<meta name="charset" content="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="title" content="{{ page.title }} - {{ site.title }}">
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="author" content="{{ page.author | default: site.author.name }}">
<meta name="keywords" content="{{ page.tags | join: ',' }}">
{% if page.status == 'public' %}
<meta name="robots" content="index, follow">
{% endif %}

<link rel="canonical" href="{{ page.url | absolute_url }}">

{% if page.banner %}
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:image" content="{{ page.banner | default: site.icon | relative_url }}">
{% else %}
<meta property="twitter:card" content="summary">
{% endif %}
<meta property="twitter:title" content="{{ page.title }} - {{ site.title }}">
<meta property="twitter:description" content="{{ page.description | default: site.description }}">
<meta property="og:type" content="article">
<meta property="og:locale" content="{{ site.lang | default: 'en-US' }}">
{% if page.banner %}
<meta property="og:image" content="{{ page.banner | default: site.icon | relative_url }}">
{% endif %}
<meta property="og:site_name" content="{{ page.title }} - {{ site.title }}">
<meta property="og:title" content="{{ page.title }} - {{ site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">

<link rel="shortcut icon" href="{{ page.icon | default: site.icon | relative_url }}">
<link rel="apple-touch-icon" href="{{ page.icon | default: site.icon | relative_url }}">
<link rel="icon" href="{{ page.icon | default: site.icon | relative_url }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
<link rel="alternate" type="application/atom+xml" title="{{ page.title }} - {{ site.title }}" href="{{ 'atom.xml' | relative_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ page.title }} - {{ site.title }}" href="{{ 'atom.xml' | relative_url }}">
<link rel="search" type="application/opensearchdescription+xml" title="{{ page.title }} - {{ site.title }}" href="{{ 'opensearch.xml' | relative_url }}">

<meta name="msapplication-TileColor" content="#151515">
<meta name="theme-color" content="#151515">

<link rel="preload" as="image" href="{{ page.banner | default: site.icon | relative_url }}">

<link rel="preconnect" href="cdnjs.cloudflare.com" crossorigin>
<link rel="preconnect" href="fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="media.discordapp.net" crossorigin>

<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "WebSite",
		"description": "{{ page.description | default: site.description }}",
		"headline": "{{ site.title }} - {{ page.title }}",
		"name": "{{ site.title }}",
		"url": "{{ site.url | absolute_url }}"
	}
</script>
