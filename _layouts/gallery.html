---
layout: default
---

<div oncontextmenu="return false">
	<div class="gallery">
	{% if page.images %}
		{% for image in page.images %}
		<img class="gallery-img" src="{{ image | relative_link }}" alt="{{page.title | default: site.title }} Gallery" onclick="">
		{% endfor %}
	{% else %}
	<p>Where're the pictures, I didn't find! :(</p>
	{% endif %}
	</div>

	{{ content }}
</div>
