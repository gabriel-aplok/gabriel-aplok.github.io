<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
	<link href="http://gmpg.org/xfn/11" rel="profile">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta http-equiv="content-type" content="text/html; charset=utf-8">

	<title>
		{% if page.title == "Home" %}
		{{ site.title }} &middot; {{ site.tagline }}
		{% else %}
		{{ page.title }} &middot; {{ site.title }}
		{% endif %}
	</title>

	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<link rel="icon" href="{{ site.baseurl }} favicon.png">
	<link rel="stylesheet" href="{{ site.baseurl }} {{ 'assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

	<link rel="alternate" type="application/atom+xml" title="Gabriel Aplok Blog" href="{{ site.baseurl }} atom.xml">

	{% seo %}
</head>

<body class="page-{{ page.page_type | default: 'home' }}">
	<div class="wrapper">
		<section>
			<div id="title">
				<a href="{{ site.baseurl }}"><h1>{{ site.title }}</h1></a>
				<p>
					{{ site.tagline }}
				</p>
				<hr>
				<div class="nav-menu">
					<a href="/">Projects</a>
					<span class="link"> | </span>
					<a href="/articles.html">Articles</a>
					<span class="link"> | </span>
					<a href="/news.html">News</a>
					<span class="link"> | </span>
					<a href="/about.html">About</a>
				</div>
			</div>

			<div class="container">
				{{ content }}
			</div>
		</section>

		{% include footer.html %}
	</div>
</body>
</html>
