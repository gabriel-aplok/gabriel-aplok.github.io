---
layout: default
title: Articles
---

<div class="articles">
	<h1>Articles</h1>
	{% for article in site.articles reversed %}
	{% if article.status == "public" %}
	<div class="article">
		<a href="{{ site.baseurl }} {{ article.url }}">
			{% if article.banner %}
			<img src="{{ article.banner }}"/>
			{% endif %}
			<h3>{{ article.title }}</h3>
			<hr>
		</a>
	</div>
	{% endif %}
	{% endfor %}
</div>
