---
layout: default
title: Articles
---

<div class="articles">
	<h1>Articles</h1>
	{% for article in site.articles reversed %}
	{% if article.status == 'public' %}
	<div class="project" onclick="window.location = '{{ site.baseurl }} {{ article.url }}';">
		{% if article.banner %}
		<img src="{{ article.banner | relative_url }}" alt="{{ article.title }}">
		{% endif %}
		<h3>{{ article.title }}</h3>
		<hr>
	</div>
	{% endif %}
	{% endfor %}
</div>
