---
layout: default
title: News
---

<div class="news">
	<h1>News</h1>
	{% for new in site.news reversed %}
	{% if new.status == 'public' %}
	<div class="project" onclick="window.location = '{{ site.baseurl }} {{ new.url }}';">
		{% if new.banner %}
		<img src="{{ new.banner | relative_url }}" alt="{{ new.title }}">
		{% endif %}
		<h3>{{ new.title }}</h3>
		<hr>
	</div>
	{% endif %}
	{% endfor %}
</div>
